<script>
    class TelegramBookingSystem {
        constructor() {
            this.botToken = '8935653149:AAFQtSw5AW2teyszyW0m5wzuaKz3vKFDgzU';
            this.chatId = '6775142470';
        }

        async sendBookingToTelegram(bookingData) {
            const message = this.formatBookingMessage(bookingData);

            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${this.botToken}/sendMessage`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            chat_id: this.chatId,
                            text: message
                        })
                    }
                );

                const data = await response.json();

                if (data.ok) {
                    return {
                        success: true,
                        data
                    };
                } else {
                    throw new Error(data.description || 'Telegram send failed');
                }

            } catch (error) {
                console.error('Telegram Error:', error);

                return {
                    success: false,
                    error: error.message
                };
            }
        }

        formatBookingMessage(data) {
            return `
🏨 NEW BOOKING REQUEST

👤 Guest Name: ${data.guestName}
📞 Phone: ${data.phone}
📧 Email: ${data.email}

📅 Check-in: ${data.checkInDate}
📅 Check-out: ${data.checkOutDate}

🛏️ Room Type: ${data.roomType}
👥 Guests: ${data.numGuests}

💬 Special Requests:
${data.specialRequests || 'None'}

🌐 Source: Website Booking
            `;
        }
    }

    const telegramBooking = new TelegramBookingSystem();

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem(
            'darkMode',
            document.body.classList.contains('dark-mode')
        );
    }

    function scrollToRooms() {
        document.getElementById('rooms').scrollIntoView({
            behavior: 'smooth'
        });
    }

    function openBookingModal(roomName) {
        document.getElementById('modalRoomName').textContent =
            `Book ${roomName}`;

        const roomTypeSelect = document.getElementById('roomType');

        if (roomTypeSelect) {
            roomTypeSelect.value =
                roomName.includes('Family') ? 'Family' :
                roomName.includes('Double') ? 'Double' :
                roomName.includes('Single') ? 'Single' : '';
        }

        document.getElementById('bookingModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('bookingModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('bookingForm').reset();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('bookingModal');

        if (event.target == modal) {
            closeModal();
        }
    }

    document.getElementById('bookingForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = {
            room: document.getElementById('roomType').value ||
                document.getElementById('modalRoomName')
                .textContent.replace('Book ', ''),

            guestName: document.getElementById('guestName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            checkInDate: document.getElementById('checkInDate').value,
            checkOutDate: document.getElementById('checkOutDate').value,
            numGuests: document.getElementById('numGuests').value,
            specialRequests: document.getElementById('specialRequests').value,
            timestamp: new Date().toISOString()
        };

        const telegramData = {
            guestName: formData.guestName,
            phone: formData.phone,
            email: formData.email,
            checkInDate: formData.checkInDate,
            checkOutDate: formData.checkOutDate,
            roomType: formData.room,
            numGuests: formData.numGuests,
            specialRequests: formData.specialRequests
        };

        const result = await telegramBooking.sendBookingToTelegram(telegramData);

        if (!result.success) {
            alert(`❌ Telegram Error: ${result.error}`);
            return;
        }

        let bookings = JSON.parse(
            localStorage.getItem('bookings') || '[]'
        );

        bookings.push(formData);

        localStorage.setItem(
            'bookings',
            JSON.stringify(bookings)
        );

        alert(
            `✅ Thank you ${formData.guestName}! Your booking request has been submitted successfully.`
        );

        closeModal();
    });

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
</script>
